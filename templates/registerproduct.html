<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Product</title>
    <style>/* ===== DESIGN TOKENS ===== */
:root {
    --background: #050816;
    --surface: rgba(15, 23, 42, 0.88);
    --surface-strong: rgba(15, 23, 42, 0.98);
    --surface-border: rgba(148, 163, 184, 0.15);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #cbd5e1;
    --primary: #38bdf8;
    --primary-dark: #0ea5e9;
    --accent: #f43f5e;
    --border-radius: 24px;
    --transition: 0.25s ease;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 24%),
                radial-gradient(circle at bottom right, rgba(244, 63, 94, 0.12), transparent 22%),
                linear-gradient(180deg, #020617 0%, #070d1d 100%);
    color: var(--text-primary);
}

.console-body-wrapper {
    min-height: 100vh;
    padding: 40px 20px 60px;
    max-width: 800px; /* Optimized structure profile for form tracking */
    margin: 0 auto;
}

/* ===== DYNAMIC HEADER HEADER PANELS ===== */
.page-header {
    padding: 30px 40px;
    margin-bottom: 40px;
    position: relative;
    background: rgba(12, 18, 35, 0.90);
    border: 1px solid rgba(148, 163, 184, 0.18);
    border-radius: 32px;
    box-shadow: 0 24px 60px rgba(0, 0, 0, 0.16);
}

.page-header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 40px;
    width: 72px;
    height: 4px;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--primary), var(--accent));
}

.header-content h1 {
    margin: 0;
    font-size: clamp(1.8rem, 4vw, 2.8rem);
    line-height: 1.1;
    letter-spacing: -0.04em;
}

.header-content p {
    margin: 12px 0 0;
    color: var(--text-muted);
    font-size: 1rem;
    line-height: 1.6;
}

/* ===== NAVIGATION ===== */
nav {
    background: var(--surface-strong);
    border: 1px solid var(--surface-border);
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    border-radius: 20px;
    margin-bottom: 40px;
}

nav a {
    text-decoration: none;
    color: var(--text-secondary);
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 12px;
    transition: all var(--transition);
}

nav a:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.05); }
nav a.active {
    color: #ffffff;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
}

/* ===== STORAGE DATA ENTRY FORMS ===== */
.form-container {
    background: var(--surface);
    border: 1px solid var(--surface-border);
    border-radius: var(--border-radius);
    padding: 40px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.18);
}

.form-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 25px;
}

.form-group label {
    color: var(--text-secondary);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 600;
}

.form-group input[type="text"] {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: 1px solid var(--surface-border);
    background: rgba(15, 23, 42, 0.95);
    color: var(--text-primary);
    transition: all var(--transition);
}

.form-group input[type="text"]:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.15);
}

/* ===== DRAG & DROP DASH FILE UPLOADS ===== */
.file-upload-wrapper {
    position: relative;
    padding: 40px 20px;
    border-radius: 16px;
    border: 2px dashed rgba(148, 163, 184, 0.3);
    background: rgba(15, 23, 42, 0.5);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: all var(--transition);
}

.file-upload-wrapper:hover {
    border-color: var(--primary);
    background: rgba(15, 23, 42, 0.8);
}

.file-upload-label { color: var(--primary); font-weight: 700; }
.file-upload-wrapper input[type="file"] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
}

/* ===== PREVIEW BOX ELEMENTS ===== */
.image-preview-area { margin-top: 25px; width: 100%; }
.gray-box {
    width: 100%;
    height: 180px;
    background-color: rgba(15, 23, 42, 0.6);
    border: 2px dashed rgba(148, 163, 184, 0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-weight: 500;
    border-radius: 16px;
}

/* ===== PROCESSING BUTTON ENGINE ===== */
.submit-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    color: white;
    font-weight: 700;
    cursor: pointer;
    background: linear-gradient(135deg, var(--primary), var(--accent));
    transition: all var(--transition);
    margin-top: 15px;
}

.submit-btn:hover:not(:disabled) {
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(56, 189, 248, 0.2);
}

/* ===== HEADINGS ===== */
h2 {
    margin: 0 0 20px 0;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
}

/* ===== NOTIFICATION CHANNELS ===== */
.form-message { font-weight: 700; margin-top: 15px; min-height: 24px; text-align: center; }
.form-message.success { color: #86efac; }
.form-message.error { color: #fecdd3; }

@media (max-width: 920px) {
    .console-body-wrapper { padding: 20px 12px; }
    .page-header { padding: 20px; border-radius: 20px; margin-bottom: 25px; }
    .page-header::after { left: 20px; }
    nav { gap: 10px; padding: 8px; margin-bottom: 25px; }
    nav a { padding: 8px 12px; font-size: 0.9rem; }
    .form-container { padding: 25px 20px; border-radius: 16px; }
}
</style>
</head>
<body>

    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/livefeed">Live Feed</a>
        <a href="/register" class="active">Add Product</a>
    </nav>

    <main class="form-container">
        <h2>Register New Product</h2>
        
        <form id="add-product-form" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="product-name">Product Name:</label>
                <input type="text" id="product-name" name="prod_name" placeholder="e.g., Plastic Bottle" required>
            </div>

            <div class="form-group">
                <label for="product-ref">Reference Code:</label>
                <input type="text" id="product-ref" name="prod_ref" placeholder="e.g., REF-001" required>
            </div>

            <div class="form-group">
                <label>Product Reference Image (for OpenCV Matching):</label>
                <div class="file-upload-wrapper">
                    <label for="product-images" class="file-upload-label">Click to upload reference frames</label>
                    <input type="file" id="product-images" name="images" accept="image/*" required multiple>
                </div>
            </div>

            <button type="submit" class="submit-btn">Register Product</button>
        </form>

        <div id="registration-message" class="form-message"></div>
    </main>

    <script src="../static/scriptregisterproduct.js"></script>
</body>
</html>
