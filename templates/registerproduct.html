<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Product</title>
    <link rel="stylesheet" href="/static/registerproduct.css">
</head>
<body>

    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/livefeed">Live Feed</a>
        <a href="/register" class="active">Add Product</a>
    </nav>

    <main class="form-container">
        <h2>Register New Product</h2>
        
        <form id="add-product-form" enctype="multipart/form-data">
            
            <div class="form-group">
                <label for="product-name">Product Name:</label>
                <input type="text" id="product-name" name="prod_name" placeholder="e.g., Plastic Bottle" required>
            </div>

            <div class="form-group">
                <label for="product-ref">Reference Code:</label>
                <input type="text" id="product-ref" name="prod_ref" placeholder="e.g., REF-001" required>
            </div>

            <div class="form-group">
                <label>Product Reference Image (for OpenCV Matching):</label>
                <div class="file-upload-wrapper">
                    <label for="product-images" class="file-upload-label">Click to upload reference frames</label>
                    <input type="file" id="product-images" name="images" accept="image/*" required multiple>
                </div>
            </div>

            <button type="submit" class="submit-btn">Register Product</button>
        </form>

        <div id="registration-message" class="form-message"></div>
    </main>

    <script src="/static/scriptregisterproduct.js"></script>
</body>
</html>
