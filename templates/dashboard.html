<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard</title>
    
    <style>/* ===== DESIGN TOKENS ===== */
:root {
    --background: #050816;
    --surface: rgba(15, 23, 42, 0.88);
    --surface-strong: rgba(15, 23, 42, 0.98);
    --surface-border: rgba(148, 163, 184, 0.15);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #cbd5e1;
    --primary: #38bdf8;
    --primary-dark: #0ea5e9;
    --accent: #f43f5e;
    --border-radius: 24px;
    --transition: 0.25s ease;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 24%),
                radial-gradient(circle at bottom right, rgba(244, 63, 94, 0.12), transparent 22%),
                linear-gradient(180deg, #020617 0%, #070d1d 100%);
    color: var(--text-primary);
}

img {
    display: block;
    max-width: 100%;
    height: auto;
    border-radius: 12px;
}

/* ===== LAYOUT WRAPPER ===== */
.console-body-wrapper {
    min-height: 100vh;
    padding: 40px 20px 60px;
    max-width: 1460px;
    margin: 0 auto;
}

/* ===== NAVIGATION BAR ===== */
nav {
    background: var(--surface-strong);
    border: 1px solid var(--surface-border);
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    border-radius: 20px;
    margin-bottom: 40px;
}

nav a {
    text-decoration: none;
    color: var(--text-secondary);
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 12px;
    transition: all var(--transition);
}

nav a:hover {
    color: var(--text-primary);
    background: rgba(255, 255, 255, 0.05);
}

nav a.active {
    color: #ffffff;
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
}

/* ===== DASHBOARD WORKSPACE GRID ===== */
.dashboard-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
    align-items: start;
    margin: 0 5%;
}

@media (min-width: 921px) {
    .dashboard-container { grid-template-columns: 64% 36%; }
}

.dashboard-container main {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
    align-items: start;
}

@media (min-width: 921px) {
    .dashboard-container main { grid-template-columns: 64% 36%; }
}

.table-section, .details-section, .dash-card {
    background: var(--surface);
    border: 1px solid var(--surface-border);
    border-radius: var(--border-radius);
    padding: 30px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.18);
}

/* ===== SCOREBOARD METRICS ===== */
.dashboard-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 24px;
    width: 100%;
    margin-bottom: 10px;
}

.dash-card h3 {
    color: var(--text-secondary);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 0 0 12px 0;
}

.dash-card p {
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--text-primary);
    margin: 0;
}

/* ===== SQL CLEAN DATA TABLES ===== */
table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    margin-top: 20px;
}

th {
    background: linear-gradient(135deg, rgba(56, 189, 248, 0.08), rgba(244, 63, 94, 0.06));
    color: var(--primary);
    font-weight: 700;
    text-align: left;
    padding: 16px;
    border-bottom: 2px solid var(--primary);
    text-transform: uppercase;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
}

td {
    padding: 16px;
    border-bottom: 1px solid var(--surface-border);
    color: var(--text-muted);
    font-size: 0.95rem;
    transition: all var(--transition);
}

tr:last-child td { border-bottom: none; }

tbody tr:hover td {
    background-color: rgba(56, 189, 248, 0.08);
    color: var(--text-primary);
    cursor: pointer;
    padding-left: 20px;
}

/* ===== DESTRUCTION INTERACTIONS ===== */
#delete-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    color: white;
    font-weight: 700;
    cursor: pointer;
    background: var(--accent);
    margin-top: 25px;
    transition: all var(--transition);
}

#delete-btn:hover {
    background: #e11d48;
    transform: translateY(-2px);
    box-shadow: 0 12px 24px rgba(244, 63, 94, 0.2);
}

/* ===== HEADINGS ===== */
h2 {
    margin: 0 0 20px 0;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
}

/* ===== DETAILS SECTION STYLING ===== */
#details-content {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

#details-content > div {
    background: rgba(56, 189, 248, 0.04);
    padding: 16px;
    border-radius: 12px;
    border-left: 3px solid var(--primary);
    transition: all var(--transition);
}

#details-content > div:hover {
    background: rgba(56, 189, 248, 0.08);
    border-left-color: var(--accent);
}

#details-content strong {
    color: var(--primary);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    display: block;
    margin-bottom: 8px;
}

#details-content p {
    margin: 0;
    color: var(--text-muted);
    font-size: 1rem;
}

#detail-name, #detail-ref {
    color: var(--text-primary) !important;
    font-weight: 600 !important;
}

#detail-img {
    width: 100%;
    border-radius: 12px;
    border: 1px solid var(--surface-border);
    margin-top: 8px;
    transition: all var(--transition);
}

#detail-img:hover {
    border-color: var(--primary);
    box-shadow: 0 8px 16px rgba(56, 189, 248, 0.1);
}

/* ===== RESPONSIVENESS ===== */
@media (max-width: 920px) {
    .console-body-wrapper { padding: 20px 12px; }
    nav { gap: 10px; padding: 8px; margin-bottom: 25px; }
    nav a { padding: 8px 12px; font-size: 0.9rem; }
    .table-section, .details-section { padding: 20px; border-radius: 16px; }
    h2 { font-size: 1.2rem; }
}</style>
</head>
<body>

    <nav>
        <a href="/dashboard" class="active">Dashboard</a>
        <a href="/livefeed">Live Feed</a>
        <a href="/register">Add Product</a>
    </nav>

    <main class="dashboard-container">
        
        <section class="table-section">
            <h2>Saved Products List</h2>
            <table>
                <thead>
                    <tr>
                        <th>Reference Code</th>
                        <th>Product Name</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <tr>
                        <td colspan="2" style="text-align: center; padding: 20px; color: var(--text-secondary);">Loading products...</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="details-section">
            <h2>Product Management</h2>
            
            <div id="details-content">
                <div>
                    <strong>Name:</strong> 
                    <p id="detail-name">Select a product...</p>
                </div>
                <div>
                    <strong>Reference Code:</strong> 
                    <p id="detail-ref">—</p>
                </div>
                <div>
                    <strong>Reference Image Blueprint:</strong>
                    <img id="detail-img" src="" style="display: none;" alt="Product Reference Image">
                </div>
                
                <button id="delete-btn">Delete Product</button>
            </div>
        </section>
    </main>

    <script src="/static/scriptdashboard.js"></script>
</body>
</html>
