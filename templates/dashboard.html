<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Dashboard</title>
    <link rel="stylesheet" href="/static/dashboard.css">
</head>
<body>

    <nav>
        <a href="/dashboard" class="active">Dashboard</a>
        <a href="/livefeed">Live Feed</a>
        <a href="/register">Add Product</a>
    </nav>

    <main class="dashboard-container">
        <input type="text" id="search-input" placeholder="Search by Reference Code...">
        <button id="search-btn" onclick="searchProducts()">Search</button>
        <section class="table-section">
            <h2>Saved Products List</h2>
            <table>
                <thead>
                    <tr>
                        <th>Reference Code</th>
                        <th>Product Name</th>
                    </tr>
                </thead>
                <tbody id="products-table-body">
                    <tr>
                        <td colspan="2" style="text-align: center; padding: 20px; color: var(--text-secondary);">Loading products...</td>
                    </tr>
                </tbody>
            </table>
        </section>

        <section class="details-section">
            <h2>Product Management</h2>
            
            <div id="details-content">
                <div>
                    <strong>Name:</strong> 
                    <p id="detail-name">Select a product...</p>
                </div>
                <div>
                    <strong>Reference Code:</strong> 
                    <p id="detail-ref">—</p>
                </div>
                <div>
                    <strong>Reference Image Blueprint:</strong>
                    <img id="detail-img" src="" style="display: none;" alt="Product Reference Image">
                </div>
                
                <button id="delete-btn">Delete Product</button>
            </div>
        </section>
    </main>
    <div id="notification-container" class="notification-container"></div>
    <script src="/static/scriptdashboard.js"></script>
</body>
</html>
