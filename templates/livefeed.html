<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Camera Feed</title>
    
    <style>/* ===== DESIGN TOKENS ===== */
:root {
    --background: #050816;
    --surface: rgba(15, 23, 42, 0.88);
    --surface-strong: rgba(15, 23, 42, 0.98);
    --surface-border: rgba(148, 163, 184, 0.15);
    --text-primary: #f8fafc;
    --text-secondary: #94a3b8;
    --text-muted: #cbd5e1;
    --primary: #38bdf8;
    --accent: #f43f5e;
    --border-radius: 24px;
    --transition: 0.25s ease;
}

* { box-sizing: border-box; }

html, body {
    margin: 0;
    padding: 0;
    min-height: 100%;
    font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 24%),
                radial-gradient(circle at bottom right, rgba(244, 63, 94, 0.12), transparent 22%),
                linear-gradient(180deg, #020617 0%, #070d1d 100%);
    color: var(--text-primary);
}

.console-body-wrapper {
    min-height: 100vh;
    padding: 40px 20px 60px;
    max-width: 1460px;
    margin: 0 auto;
}

/* ===== NAVIGATION BAR ===== */
nav {
    background: var(--surface-strong);
    border: 1px solid var(--surface-border);
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 12px;
    border-radius: 20px;
    margin-bottom: 40px;
}

nav a {
    text-decoration: none;
    color: var(--text-secondary);
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 12px;
    transition: all var(--transition);
}

nav a:hover { color: var(--text-primary); background: rgba(255, 255, 255, 0.05); }
nav a.active {
    color: #ffffff;
    background: linear-gradient(135deg, var(--primary), #0ea5e9);
    box-shadow: 0 8px 20px rgba(56, 189, 248, 0.25);
}

/* ===== FEED SPLIT WORKSPACE ===== */
.feed-container {
    display: grid;
    grid-template-columns: 1fr;
    gap: 30px;
    align-items: start;
    margin: 0 5%;
}

@media (min-width: 921px) {
    .feed-container { grid-template-columns: 64% 36%; }
}

.video-box, .results-box {
    background: var(--surface);
    border: 1px solid var(--surface-border);
    border-radius: var(--border-radius);
    padding: 30px;
    box-shadow: 0 30px 60px rgba(0, 0, 0, 0.18);
    position: relative;
}

/* ===== VIDEO FRAME PANEL ===== */
.camera-stream {
    width: 100%;
    border-radius: 16px;
    border: 1px solid var(--surface-border);
    background: #020617;
    object-fit: contain;
}

/* ===== RUNTIME METRICS LAYER ===== */
.stat-row {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 16px;
    background: rgba(56, 189, 248, 0.04);
    border-radius: 12px;
    border-left: 3px solid var(--primary);
    transition: all var(--transition);
}

.stat-row:hover {
    background: rgba(56, 189, 248, 0.08);
    border-left-color: var(--accent);
}

.stat-row strong {
    color: var(--primary);
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 700;
}

.stat-row span {
    font-weight: 700;
    color: var(--text-primary);
    font-size: 1.1rem;
}

/* ===== STATUS & ANIMATION COMPONENT LABELS ===== */
.status-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    border-radius: 999px;
    border: 1px solid rgba(34, 197, 94, 0.24);
    background: rgba(34, 197, 94, 0.12);
    color: #bbf7d0;
    text-transform: uppercase;
    font-size: 0.75rem;
    font-weight: 700;
}

.live-indicator {
    position: absolute;
    top: 20px;
    right: 20px;
    padding: 8px 14px;
    display: inline-flex;
    align-items: center;
    border-radius: 999px;
    background: rgba(244, 63, 94, 0.95);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    animation: pulseGlow 2.4s ease-in-out infinite;
}

@keyframes pulseGlow {
    0%, 100% { box-shadow: 0 0 0 0 rgba(244, 63, 94, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(244, 63, 94, 0.08); }
}

/* ===== HEADINGS ===== */
h2 {
    margin: 0 0 20px 0;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text-primary);
}

/* ===== IMAGE PREVIEW STYLING ===== */
.image-preview-area {
    margin-top: 20px;
    width: 100%;
    padding: 16px;
    background: rgba(56, 189, 248, 0.04);
    border-radius: 12px;
    border-left: 3px solid var(--primary);
}

.gray-box {
    width: 100%;
    height: 180px;
    background-color: rgba(15, 23, 42, 0.6);
    border: 2px dashed var(--primary);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-secondary);
    font-weight: 500;
    border-radius: 12px;
    transition: all var(--transition);
}

.gray-box:hover {
    border-color: var(--accent);
    background-color: rgba(244, 63, 94, 0.04);
}

#res-img {
    border-radius: 12px;
    border: 1px solid var(--surface-border);
    transition: all var(--transition);
}

#res-img:hover {
    border-color: var(--primary);
    box-shadow: 0 8px 16px rgba(56, 189, 248, 0.1);
}

@media (max-width: 920px) {
    .console-body-wrapper { padding: 20px 12px; }
    nav { gap: 10px; padding: 8px; margin-bottom: 25px; }
    nav a { padding: 8px 12px; font-size: 0.9rem; }
    .video-box, .results-box { padding: 20px; border-radius: 16px; }
}
</style>
</head>
<body>

    <nav>
        <a href="/dashboard">Dashboard</a>
        <a href="/livefeed" class="active">Live Feed</a>
        <a href="/register">Add Product</a>
    </nav>

    <main class="feed-container">
        
        <section class="video-box">
            <h2>Live Video Feed</h2>
            <img src="/video_feed" alt="Camera Stream" class="camera-stream">
        </section>

        <section class="results-box">
            <h2>Detected Product Info</h2>
            <br>
            <div class="stat-row">
                <strong>Product Name:</strong> 
                <span id="res-name">--</span>
            </div>
            <br>
            <div class="stat-row">
                <strong>Reference Code:</strong> 
                <span id="res-ref">--</span>
            </div>
            <br>
            <div class="stat-row">
                <strong>Total Items Counted:</strong> 
                <span id="res-total">0</span>
            </div>
            <br>
            <div class="image-preview-area">
                <img id="res-img" src="" alt="Matched Product" style="display: none; max-width: 100%;">
                
                <div id="img-placeholder" class="gray-box">
                    <span>No Product Matched Yet</span>
                </div>
            </div>
        </section>

    </main>

    <script src="../static/scriptlivefeed.js"></script>
</body>
</html>
